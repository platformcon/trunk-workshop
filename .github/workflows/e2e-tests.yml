name: E2E Tests
on:
  push:
  pull_request:
jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Lift the secrets into env so the upload step's `if` can gate on them:
    # the `secrets` context is NOT available in a step-level `if`, but `env` is.
    # A missing secret is an empty string, so the upload no-ops before setup.
    env:
      TRUNK_API_TOKEN: ${{ secrets.TRUNK_API_TOKEN }}
      TRUNK_ORG_URL_SLUG: ${{ secrets.TRUNK_ORG_URL_SLUG }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0 # keep in sync with .trunk/trunk.yaml
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run build
      # Clear stale JUnit so a reused runner can't re-upload old results.
      - run: rm -rf test-results && mkdir -p test-results
      - name: Run e2e tests
        run: npm run test:e2e
        continue-on-error: true # let the upload step run + enable quarantine
      - name: Upload results to Trunk
        if: ${{ !cancelled() && env.TRUNK_API_TOKEN != '' }}
        continue-on-error: true
        uses: trunk-io/analytics-uploader@v1
        with:
          junit-paths: test-results/e2e-junit.xml
          org-slug: ${{ env.TRUNK_ORG_URL_SLUG }}
          token: ${{ env.TRUNK_API_TOKEN }}
